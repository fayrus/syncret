site_name: Syncret
site_description: Automates follow-up actions when secrets rotate or change
site_url: https://syncret.fayr.us
repo_url: https://github.com/fayrus/syncret
repo_name: fayrus/syncret

docs_dir: .
site_dir: ../site

theme:
  name: material
  palette:
    scheme: default
    primary: blue
    accent: cyan
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - How it works: how-it-works.md
  - Reference: reference.md
  - Deployment:
      - Overview: deployment.md
      - AWS: deployment/aws.md
  - Changelog: changelog.md
