name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths-ignore:
      - ".github/**"
      - "docs/**"
      - "Makefile"
      - "LICENSE"
      - ".dockerignore"
      - "*.md"
  workflow_dispatch:
    inputs:
      allow_vulnerable_image:
        description: "Allow publishing when Trivy finds fixable HIGH or CRITICAL vulnerabilities"
        required: false
        default: false
        type: boolean

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build image for security scan
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: fayrus/syncret:${{ steps.version.outputs.version }}
          pull: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: fayrus/syncret:${{ steps.version.outputs.version }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_vulnerable_image && '0' || '1' }}

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        with:
          sarif_file: trivy-results.sarif

  publish:
    name: Publish
    needs: security-scan
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION)
          {
            echo "version=$VERSION"
            echo "major=$(echo "$VERSION" | grep -oP 'v\d+')"
            echo "minor=$(echo "$VERSION" | grep -oP 'v\d+\.\d+')"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: fayrus/syncret
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.minor }}
            type=raw,value=${{ steps.version.outputs.major }}

      - name: Build and push
        id: publish
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          pull: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create git tag
        id: git_tag
        run: |
          VERSION=$(cat VERSION)
          if ! git ls-remote --tags origin "$VERSION" | grep -q "$VERSION"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$VERSION"
            git push origin "$VERSION"
            echo "created=true" >> "$GITHUB_OUTPUT"
          else
            echo "created=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if README changed
        id: readme
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^README.md$"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Docker Hub description
        if: steps.readme.outputs.changed == 'true'
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: fayrus/syncret

      - name: Publish summary
        if: always()
        run: |
          {
            echo "## Publish summary"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Job status | ${{ job.status }} |"
            echo "| Version | ${{ steps.version.outputs.version }} |"
            echo "| Major tag | ${{ steps.version.outputs.major }} |"
            echo "| Minor tag | ${{ steps.version.outputs.minor }} |"
            echo "| Image | fayrus/syncret |"
            echo "| Published tags | latest, ${{ steps.version.outputs.version }}, ${{ steps.version.outputs.minor }}, ${{ steps.version.outputs.major }} |"
            echo "| Image digest | ${{ steps.publish.outputs.digest }} |"
            echo "| Git tag created | ${{ steps.git_tag.outputs.created }} |"
            echo "| README changed | ${{ steps.readme.outputs.changed }} |"
            echo "| Docker Hub description update | ${{ steps.readme.outputs.changed == 'true' && 'requested' || 'skipped' }} |"
            echo "| Vulnerable image override | ${{ github.event_name == 'workflow_dispatch' && inputs.allow_vulnerable_image || false }} |"
          } >> "$GITHUB_STEP_SUMMARY"
