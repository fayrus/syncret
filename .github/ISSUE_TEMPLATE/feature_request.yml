name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or improvement you'd like.
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Why is this worth doing? Describe operational, security, or user-facing impact.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've tried or evaluated.

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: Concrete conditions that must be true when this request is complete.

  - type: dropdown
    id: provider
    attributes:
      label: Cloud provider (if applicable)
      options:
        - N/A
        - AWS
        - Azure
        - GCP
        - Multiple

  - type: dropdown
    id: change_type
    attributes:
      label: Change type
      options:
        - Feature
        - Improvement
        - Refactor
        - Documentation
    validations:
      required: true

  - type: textarea
    id: risks
    attributes:
      label: Risks or compatibility notes
      description: Rollout risks, breaking changes, or migration needs.
