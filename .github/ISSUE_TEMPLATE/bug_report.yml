name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.
        **Do not include secret values, tokens, or credentials anywhere in this report.**

  - type: input
    id: version
    attributes:
      label: Syncret version
      description: Docker image tag or binary version (e.g. `v0.1.0`, `latest`, `sha-abc1234`)
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Cloud provider
      options:
        - AWS
        - Azure
        - GCP
        - Other
    validations:
      required: true

  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options:
        - arm64
        - amd64
    validations:
      required: true

  - type: dropdown
    id: event_type
    attributes:
      label: Event type
      description: The eventName that triggered Syncret
      options:
        - RotationSucceeded
        - PutSecretValue
        - RotationFailed
        - Unknown / other
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration (sanitized)
      description: |
        Environment variables in use — replace ARNs with placeholders and omit secret values.
        Example: `SYNCRET_SECRET_ARN=arn:aws:secretsmanager:us-east-1:123456789012:secret:my-secret-*`
      render: shell

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the current behavior and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Smallest set of steps needed to reproduce the issue.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Relevant log output (CloudWatch or local). Sanitize any ARNs, account IDs, or request tokens if needed.
      render: shell

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: |
        Describe the operational impact.
        Examples: secret not updated, ECS services not redeployed, Lambda erroring on every invocation.
